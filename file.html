<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Study Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    text-align: center;
    transition: 0.3s;
}

.light {
    background: #f5f5f5;
    color: black;
}

.container {
    width: 320px;
    margin: auto;
    padding: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

input {
    padding: 10px;
    width: 70%;
}

li {
    list-style: none;
    margin: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>📊 Smart Study Dashboard</h2>

<h1 id="timer">25:00</h1>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<p>عدد الجلسات: <span id="sessions">0</span></p>

<hr>

<h3>📝 المهام</h3>

<input id="taskInput" placeholder="اكتب مهمتك">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<hr>

<button onclick="toggleMode()">🌙 / ☀️</button>

</div>

<script>
let time = 1500;
let timer;
let running = false;

let sessions = localStorage.getItem("sessions") || 0;
document.getElementById("sessions").innerText = sessions;

function updateDisplay() {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText =
        `${m}:${s < 10 ? "0" : ""}${s}`;
}

function startTimer() {
    if (running) return;
    running = true;

    timer = setInterval(() => {
        if (time > 0) {
            time--;
            updateDisplay();
        } else {
            clearInterval(timer);
            running = false;
            sessions++;
            localStorage.setItem("sessions", sessions);
            document.getElementById("sessions").innerText = sessions;

            new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3").play();
            alert("خلصت الجلسة 🔥");
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(timer);
    running = false;
}

function resetTimer() {
    clearInterval(timer);
    time = 1500;
    running = false;
    updateDisplay();
}

function addTask() {
    let input = document.getElementById("taskInput");
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    tasks.push(input.value);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    input.value = "";
    loadTasks();
}

function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        let li = document.createElement("li");
        li.innerText = task + " ❌";
        li.onclick = () => {
            tasks.splice(index, 1);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            loadTasks();
        };
        list.appendChild(li);
    });
}

function toggleMode() {
    document.body.classList.toggle("light");
}

loadTasks();
updateDisplay();
</script>

</body>
</html>
